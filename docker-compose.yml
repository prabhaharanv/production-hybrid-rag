services:
  rag-api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OTLP_ENDPOINT=http://otel-collector:4317
      - LOG_JSON=true
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ~/.cache/huggingface:/home/appuser/.cache/huggingface  # caches models on host; auto-downloads on first run
    restart: unless-stopped
    depends_on:
      - otel-collector

  # ---- Observability Stack ----

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./monitoring/otel-collector.yml:/etc/otelcol-contrib/config.yaml
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.3.1
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/rag-dashboard.json
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./monitoring/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.69.0
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317"         # OTLP gRPC (from otel-collector)
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rag-data
  namespace: rag
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rag-hf-cache
  namespace: rag
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi

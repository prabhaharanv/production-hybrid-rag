apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: rag
  labels:
    app.kubernetes.io/name: rag-api
    app.kubernetes.io/version: "0.5.0"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: rag-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      containers:
        - name: rag-api
          image: hybrid-rag:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: rag-api-config
            - secretRef:
                name: rag-api-secrets
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 18  # up to 3 min for model download
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: hf-cache
              mountPath: /home/appuser/.cache/huggingface
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rag-data
        - name: hf-cache
          persistentVolumeClaim:
            claimName: rag-hf-cache
